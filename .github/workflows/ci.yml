name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore
        run: dotnet restore StableDiffusionStudio.slnx

      - name: Build (Release)
        run: dotnet build StableDiffusionStudio.slnx --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Clean stale test results
        run: find . -path "*/TestResults" -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Test with coverage
        timeout-minutes: 10
        run: |
          dotnet test StableDiffusionStudio.slnx \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName!~E2E" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[StableDiffusionStudio.Domain]*,[StableDiffusionStudio.Application]*,[StableDiffusionStudio.Infrastructure]*" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*Tests]*,[StableDiffusionStudio.Web]*,[StableDiffusionStudio.AppHost]*,[StableDiffusionStudio.ServiceDefaults]*"

      - name: Install ReportGenerator
        run: dotnet tool update -g dotnet-reportgenerator-globaltool

      - name: Combine coverage and create reports
        shell: bash
        run: |
          REPORTS=$(find . -type f -path "*/TestResults/*/coverage.cobertura.xml" | tr '\n' ';')
          reportgenerator \
            -reports:"$REPORTS" \
            -targetdir:"coverage-report" \
            -reporttypes:"HtmlInline;Cobertura;TextSummary;lcov;Badges" \
            -assemblyfilters:"+StableDiffusionStudio.Domain;+StableDiffusionStudio.Application;+StableDiffusionStudio.Infrastructure;-*Tests*;-StableDiffusionStudio.Web;-StableDiffusionStudio.AppHost;-StableDiffusionStudio.ServiceDefaults" \
            -filefilters:"-**/Migrations/**"
          echo "COVERAGE_SUMMARY<<EOF" >> $GITHUB_ENV
          cat coverage-report/Summary.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report

      - name: Add coverage summary to PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          recreate: true
          message: |
            ## Code Coverage
            ```
            ${{ env.COVERAGE_SUMMARY }}
            ```

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: |
            **/TestResults/*/coverage.cobertura.xml
          flags: unittests
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Release pipeline: test -> publish (per-platform) -> create GitHub Release
  # ---------------------------------------------------------------------------
  release-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.gitversion.outputs.majorMinorPatch }}
      assembly-version: ${{ steps.gitversion.outputs.assemblySemVer }}
      file-version: ${{ steps.gitversion.outputs.assemblySemFileVer }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Fetch tags
        run: git fetch --prune --tags

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.x'

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4

      - name: Restore
        run: dotnet restore StableDiffusionStudio.slnx

      - name: Build (Release)
        run: >
          dotnet build StableDiffusionStudio.slnx
          --configuration Release
          --no-restore
          /p:ContinuousIntegrationBuild=true
          /p:Version=${{ steps.gitversion.outputs.majorMinorPatch }}
          /p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }}
          /p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }}

      - name: Clean stale test results
        run: find . -path "*/TestResults" -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Test (Release)
        timeout-minutes: 10
        run: |
          dotnet test StableDiffusionStudio.slnx \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName!~E2E" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[StableDiffusionStudio.Domain]*,[StableDiffusionStudio.Application]*,[StableDiffusionStudio.Infrastructure]*" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*Tests]*,[StableDiffusionStudio.Web]*,[StableDiffusionStudio.AppHost]*,[StableDiffusionStudio.ServiceDefaults]*" \
            -- RunConfiguration.TestSessionTimeout=300000

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: |
            **/TestResults/*/coverage.cobertura.xml
          flags: unittests
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  release-publish:
    needs: release-test
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: StableDiffusionStudio-win-x64
            archive-ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            artifact: StableDiffusionStudio-linux-x64
            archive-ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            artifact: StableDiffusionStudio-osx-arm64
            archive-ext: tar.gz
          - os: macos-latest
            rid: osx-x64
            artifact: StableDiffusionStudio-osx-x64
            archive-ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Publish self-contained
        run: >
          dotnet publish src/StableDiffusionStudio.Web/StableDiffusionStudio.Web.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:Version=${{ needs.release-test.outputs.version }}
          -p:AssemblyVersion=${{ needs.release-test.outputs.assembly-version }}
          -p:FileVersion=${{ needs.release-test.outputs.file-version }}
          -o publish/${{ matrix.artifact }}

      - name: Create archive (Windows)
        if: matrix.archive-ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "publish/${{ matrix.artifact }}/*" `
            -DestinationPath "${{ matrix.artifact }}-v${{ needs.release-test.outputs.version }}.zip"

      - name: Create archive (Linux/macOS)
        if: matrix.archive-ext == 'tar.gz'
        run: |
          tar -czf "${{ matrix.artifact }}-v${{ needs.release-test.outputs.version }}.tar.gz" \
            -C publish "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}-v${{ needs.release-test.outputs.version }}.${{ matrix.archive-ext }}
          retention-days: 5

  release-create:
    needs: [release-test, release-publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          pattern: StableDiffusionStudio-*
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create and push git tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.release-test.outputs.version }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists. Skipping tag push."
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release-test.outputs.version }}
          name: Release v${{ needs.release-test.outputs.version }}
          generate_release_notes: true
          files: release-assets/*
