name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.editorconfig'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.x'

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4

      - name: Set version
        id: version
        run: |
          VERSION="${{ steps.gitversion.outputs.majorMinorPatch }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore StableDiffusionStudio.slnx

      - name: Build solution
        run: |
          dotnet build StableDiffusionStudio.slnx \
            --configuration Release \
            --no-restore \
            /p:ContinuousIntegrationBuild=true \
            /p:Deterministic=true

      - name: Run tests
        run: |
          dotnet test StableDiffusionStudio.slnx \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName!~E2E" \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[StableDiffusionStudio.Domain]*,[StableDiffusionStudio.Application]*,[StableDiffusionStudio.Infrastructure]*" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*Tests]*,[StableDiffusionStudio.Web]*,[StableDiffusionStudio.AppHost]*,[StableDiffusionStudio.ServiceDefaults]*"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            TestResults/**/*.trx
          check_name: Test Results

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: ./TestResults/**/coverage.opencover.xml
          flags: unittests
          name: pr-${{ github.event.pull_request.number }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build Documentation
        run: |
          dotnet tool update -g docfx
          docfx metadata docs/docfx.json
          docfx build docs/docfx.json

      - name: Create PR comment
        uses: actions/github-script@v9
        if: always()
        with:
          script: |
            const body = `## PR Validation Results

            **Version:** \`${{ steps.version.outputs.VERSION }}\`

            ### Validation Steps
            - [x] Build solution
            - [x] Run tests
            - [x] Build documentation

            ---
            *This comment was automatically generated by the PR validation workflow.*
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('PR Validation Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
