coverage:
  status:
    project:
      default:
        target: 60%
        threshold: 5%
    patch:
      default:
        target: 60%

flags:
  unittests:
    paths:
      - src/StableDiffusionStudio.Domain/
      - src/StableDiffusionStudio.Application/
      - src/StableDiffusionStudio.Infrastructure/
    carryforward: true
  e2e:
    paths:
      - src/
    carryforward: true

ignore:
  - "**/*.Tests/**"
  - "**/*Tests*/**"
  - "**/StableDiffusionStudio.AppHost/**"
  - "**/StableDiffusionStudio.ServiceDefaults/**"
  - "**/Migrations/**"
  - "**/DTOs/**"
  - "**/Commands/**"
  - "**/Interfaces/**"
  - "**/wwwroot/**"
